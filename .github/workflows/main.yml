name: Wed-host
on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github
    runs-on: ubuntu-latest

    steps:
      - name: clone
        uses: actions/checkout@v7.0.0

      - name: config github pages
        uses: actions/configure-pages@v6.0.0

      - name: upload
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: .

      - name: deploy
        uses: actions/deploy-pages@v3.0.2-node.24
        
